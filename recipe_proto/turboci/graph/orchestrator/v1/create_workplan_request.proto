syntax = "proto3";

package turboci.graph.orchestrator.v1;

option go_package = "go.chromium.org/turboci/proto/go/graph/orchestrator/v1;orchestratorpb";
option java_multiple_files = true;

// Request message for TurboCIOrchestrator.CreateWorkPlan.
//
// Currently can only create empty work plans that can later be populated via
// WriteNodes call.
message CreateWorkPlanRequest {
  // The security realm for this WorkPlan.
  //
  // Controls who can add nodes to it.
  //
  // Required.
  optional string realm = 1;

  // Used to deduplicate retries of CreateWorkPlan call.
  //
  // Multiple calls to CreateWorkPlan from the same user with the same
  // idempotency key will all return the same workplan.
  //
  // Required. Must be at least 8 bytes long. Can be a randomly generated
  // string.
  optional string idempotency_key = 2;

  // The optional name of the workflow that this WorkPlan is an instance of.
  //
  // This should describe the 'class' of the workplan within the given project,
  // e.g. "presubmit", "postsubmit", etc. The classes used over time should
  // be fairly static - this must *not* include high-cardinality data like:
  //   * ChangeIds or Git Commits
  //   * Build numbers
  //   * etc.
  //
  // This is *not* intended to be globally unique, but rather to be used to
  // group together workplans of similar purpose/intent.
  //
  // Must adhere to the regex: /^[a-zA-Z0-9\(\)\-_./ ]{0,256}$/
  optional string workflow_name = 3;
}
