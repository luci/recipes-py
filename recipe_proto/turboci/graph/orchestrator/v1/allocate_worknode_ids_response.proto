syntax = "proto3";

package turboci.graph.orchestrator.v1;

import "turboci/graph/ids/v1/identifier.proto";

option go_package = "go.chromium.org/turboci/proto/go/graph/orchestrator/v1;orchestratorpb";
option java_multiple_files = true;

// Response message for TurboCIOrchestrator.AllocateWorkNodeIDs.
message AllocateWorkNodeIDsResponse {
  // Generated WorkNode stage IDs.
  //
  // They have `work_plan` populated and `is_worknode` bit set to true.
  repeated ids.v1.Stage ids = 1;
}
