syntax = "proto3";

package turboci.graph.orchestrator.v1;

import "google/api/field_behavior.proto";
import "turboci/graph/ids/v1/identifier.proto";
import "turboci/graph/orchestrator/v1/check.proto";
import "turboci/graph/orchestrator/v1/revision.proto";
import "turboci/graph/orchestrator/v1/stage.proto";

option go_package = "go.chromium.org/turboci/proto/go/graph/orchestrator/v1;orchestratorpb";
option java_multiple_files = true;

// WorkPlan provides a collated, partial, view of a single workplan.
//
// Nodes (specifically, Checks and Stages and their Edits, and StageAttempts)
// may be omitted under these conditions:
// - The caller does not have permission to view the node.
// - The caller only requested a subset of possible nodes (e.g. via query/filter
// parameters)
// - The caller only requested a subset of the possible data types (e.g. Check
// options)
// - The content requested by the caller is being returned over several
// paginated queries and is not present in the current page.
//
// When a node that contains child nodes (e.g. a Stage which may have
// StageAttempts and Edits) is included, it will contain all of its child nodes
// that match the rest of the request. These parent nodes may be included in a
// response in order to return matching child nodes, even if the parent node
// doesn't match the request on its own.
//
// Within a node, all ValueRefs will be present, but they may reference the
// digest of a ValueData that is not present in the WorkPlan based on the
// parameters the caller provides in the request.
//
// Next ID: 8
message WorkPlan {
  // The WorkPlan to which all nodes in this WorkPlan belong.
  optional ids.v1.WorkPlan identifier = 1;

  // When a WorkPlan is returned from a read operation (e.g. QueryNodes),
  // version will be the Revision of the WorkPlan row used to prepare this
  // WorkPlan.
  optional Revision version = 2;

  // Maps this WorkPlan to a security realm.
  optional string realm = 3 [(google.api.field_behavior) = IMMUTABLE];

  // The name of the workflow of which this this WorkPlan is an instance.
  //
  // This will describe the 'class' of the workplan within the given project -
  // two workplans with the same 'workflow_name' do 'the same thing' (as defined
  // by the owners of the workplan). An example of this may be "presubmit" or
  // "postsubmit", etc.
  //
  // This will not include any high cardinality information (like commits,
  // change IDs, build numbers, etc.).
  //
  // Must adhere to the regex: /^[a-zA-Z0-9\(\)\-_./ ]{0,256}$/
  oneof name {
    // A workflow name from pre-registered service configuration.
    string workflow_name = 6;

    // A workflow name provided manually by the caller of CreateWorkPlan.
    //
    // This may look like a `workflow_name`, but only has syntactic validation.
    // Do not assume that workplans with a dynamic_workflow_name have any
    // correlation whatsoever with other workplans with the same
    // dynamic_workflow_name, or workplans with the same workflow_name.
    string dynamic_workflow_name = 7;
  }

  // Checks in the graph.
  repeated Check checks = 4;

  // Stages in the graph.
  repeated Stage stages = 5;
}
